    items:
      - company: "Aintegrator"
        companyUrl: "https://aintegrator.ch"
        jobs:
          - name: "DevOps Engineer"
            date: "Oct 2025 - present"
            content: "As a DevOps Engineer at AIntegrator, I led key initiatives across CI/CD modernization, Kubernetes infrastructure, cloud deployments, backup strategy, and production readiness. My work directly improved system reliability, developer productivity, and deployment consistency across multiple customer-facing platforms, including Transcript, Valais, and LiaChat.


            - CI/CD Automation and Pipeline Improvements

            Replaced manual weekly deployments (5/week) with automated reusable GitHub Actions workflows, enabling 5+ deployments per day.
            Implemented PR-label–based Dev → STG promotion, eliminating human error.
            Result: Zero pipeline failures and significantly fewer errors reaching production.

            - Kubernetes and Multi-Cluster Management

            Managed three Kubernetes clusters across STG and PRD with a combined 10 nodes, hosting multiple microservices, across Transcript, LiaChat, and Valais clusters.
            Standardized production-ready deployments with Helm and GitOps (ArgoCD).
            Diagnosed and fixed cluster-level issues including OIDC failures, networking issues, ingress routing, and service misconfigurations.

            - Monitoring, Alerting & Observability (Built from scratch)

            Introduced full observability stack where none existed before.
            Set up Grafana Cloud with dashboards for CPU, RAM, disk, pod metrics, and cluster health.
            Integrated log aggregation using Grafana Alloy.
            Result: Faster incident detection and improved overall reliability (99% uptime).

            - Disaster Recovery & Backup Strategy (3-2-1 Rule)
            
            Designed and implemented daily 3-2-1 backups for - LiaChat (STG/PRD), LiaTranscript (STG/PRD), Valais (STG), Passbolt.
            Automated backup jobs via Kubernetes CronJobs across all clusters.
            Reduced database recovery time from hours → ~15 minutes through automated restore scripts.
            Ensured full offsite and object-storage redundancy for long-term resilience."
            # content: "I am currently working as a senior software developer at [example org.](https://example.com) in San Francisco, CA. I am currently working on a project that will be used to help people find the best way to get around the city."
