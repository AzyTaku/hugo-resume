      - company: "Victrix Tech"
        # companyUrl: "https://example.com"
        jobs:
          - name: "Quality Assuarance Engineer"
            date: "February, 2025 - August, 2025"
            # info:
              # content: I worked as a software developer for more than one year in Amazon.
            content: |
              Actively led QA efforts in a fast-paced full-stack development environment, taking ownership of test strategy, execution, and quality standards across multiple services. Implemented automated tests using Jest and Supertest for API verification, and Cypress for end-to-end coverage, ensuring product reliability throughout rapid release cycles.
              - Stepped into a hybrid engineering role—functioning as both QA and the de facto lead—collaborating closely with backend and frontend teams to drive quality decisions, identify gaps, and maintain stability throughout the product lifecycle. Integrated automated test suites into the CI pipeline using GitHub Actions, enabling test execution on every pull request and merge for early defect detection and stronger continuous integration.
              - Leveraged tools such as Postman and MongoDB Compass for debugging, validation, and ensuring consistent API and database behavior. Demonstrated fast learning, reliability, and strong problem-solving skills, becoming a trusted contributor despite the short five-month timeframe.

